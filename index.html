<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Library</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <script defer src="app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <div class="app" x-data="iconGallery()" x-init="init()">
      <section class="screen-error" aria-live="polite" x-show="hasLoadError">
        <h2>Impossible de charger la bibliotheque d'icones.</h2>
        <p>Rafraichis la page ou verifie que icons.json est accessible.</p>
      </section>

      <header class="site-header" x-show="!hasLoadError">
        <h1 class="site-title">Icon Library</h1>

        <form class="search-form" role="search" @submit.prevent>
          <label for="icon-search">Rechercher une icone</label>
          <div class="search-field-wrapper">
            <input
              id="icon-search"
              name="icon-search"
              type="search"
              placeholder="Nom, mot-cle..."
              autocomplete="off"
              x-model="searchInput"
            />
            <button
              type="button"
              aria-label="Effacer la recherche"
              @click="clearSearch()"
              x-show="searchInput.length > 0"
            >
              x
            </button>
          </div>
        </form>
      </header>

      <main class="content" id="main-content" x-show="!hasLoadError">
        <section class="loading-state" x-show="isLoading" aria-live="polite">
          <p>Chargement des icones...</p>
        </section>

        <section class="categories-view" aria-label="Categories d'icones" x-show="!hasActiveSearch && !isLoading">
          <template x-for="category in displayedCategories()" :key="category.id">
            <section class="category-section" :aria-label="category.label">
              <h2 class="category-title" x-text="category.label"></h2>

              <div class="icon-grid" x-show="category.limitedIcons.length > 0">
                <template x-for="icon in category.limitedIcons" :key="icon.id">
                  <article class="icon-card-wrapper">
                    <button
                      type="button"
                      class="icon-card"
                      :aria-label="`Voir les details de ${icon.name}`"
                      @click="openDetail(icon, category.label, $event)"
                    >
                      <img
                        class="icon-image"
                        :src="icon.file"
                        :alt="icon.name"
                        loading="lazy"
                        @error="markIconAsBroken(icon.id)"
                      />
                      <span class="icon-name" x-text="icon.name"></span>
                    </button>
                  </article>
                </template>
              </div>

              <p class="category-empty" x-show="category.limitedIcons.length === 0">Aucune icone disponible</p>
            </section>
          </template>
        </section>

        <section class="search-results-view" aria-live="polite" x-show="hasActiveSearch && !isLoading">
          <div class="icon-grid" x-show="searchResults().length > 0">
            <template x-for="icon in searchResults()" :key="icon.id">
              <article class="icon-card-wrapper">
                <button
                  type="button"
                  class="icon-card"
                  :aria-label="`Voir les details de ${icon.name}`"
                  @click="openDetail(icon, icon.categoryLabel, $event)"
                >
                  <img
                    class="icon-image"
                    :src="icon.file"
                    :alt="icon.name"
                    loading="lazy"
                    @error="markIconAsBroken(icon.id)"
                  />
                  <span class="icon-name" x-text="icon.name"></span>
                  <span class="icon-category" x-text="icon.categoryLabel"></span>
                </button>
              </article>
            </template>
          </div>

          <p class="search-empty" x-show="searchResults().length === 0">
            Aucune icone trouvee pour "<span x-text="debouncedSearchQuery"></span>"
          </p>
        </section>
      </main>

      <div class="modal-overlay" x-show="isDetailOpen" @click.self="closeDetail()">
        <aside
          class="icon-detail-modal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="icon-detail-title"
          x-show="isDetailOpen"
          x-ref="detailModal"
          @keydown.escape.prevent.stop="closeDetail()"
          @keydown.tab.prevent="handleModalTab($event)"
        >
          <header class="detail-header">
            <h2 id="icon-detail-title" class="detail-title" x-text="selectedIcon ? selectedIcon.name : ''"></h2>
            <button
              type="button"
              class="detail-close"
              aria-label="Fermer la fenetre de detail"
              x-ref="detailCloseButton"
              @click="closeDetail()"
            >
              x
            </button>
          </header>

          <div class="detail-body" x-show="selectedIcon">
            <div class="detail-preview">
              <img
                class="detail-preview-image"
                :src="selectedIcon ? selectedIcon.file : ''"
                :alt="selectedIcon ? selectedIcon.name : ''"
              />
            </div>

            <p class="detail-meta">
              <strong>Categorie:</strong>
              <span x-text="selectedIcon ? selectedIcon.categoryLabel : ''"></span>
            </p>

            <p class="detail-meta" x-show="selectedIcon && selectedIcon.author">
              <strong>Auteur:</strong>
              <span x-text="selectedIcon ? selectedIcon.author : ''"></span>
            </p>

            <p class="detail-meta" x-show="selectedIcon && selectedIcon.description">
              <strong>Description:</strong>
              <span x-text="selectedIcon ? selectedIcon.description : ''"></span>
            </p>

            <div class="detail-tags" x-show="selectedIcon && selectedIcon.keywords && selectedIcon.keywords.length > 0">
              <template x-for="keyword in selectedIcon ? selectedIcon.keywords : []" :key="keyword">
                <span class="detail-tag" x-text="keyword"></span>
              </template>
            </div>

            <p class="detail-error" x-show="detailSvgLoadError" x-text="detailSvgLoadError"></p>
            <p class="detail-error" x-show="copyError" x-text="copyError"></p>

            <div class="detail-actions">
              <button
                type="button"
                class="detail-action"
                x-ref="copyButton"
                @click="copySvg()"
                :disabled="!selectedIcon"
                x-text="copyButtonLabel()"
              ></button>

              <a
                class="detail-action detail-download"
                :href="selectedIcon ? selectedIcon.file : '#'"
                :download="selectedIcon ? `${selectedIcon.id}.svg` : null"
                :aria-disabled="!selectedIcon"
                @click="if (!selectedIcon) $event.preventDefault()"
              >
                Telecharger
              </a>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </body>
</html>
