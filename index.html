<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Library</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <script defer src="app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <div class="app" x-data="iconGallery()" x-init="init()">
      <section class="screen-error" aria-live="polite" x-show="hasLoadError">
        <h2>Impossible de charger la bibliotheque d'icones.</h2>
        <p>Rafraichis la page ou verifie que icons.json est accessible.</p>
      </section>

      <header class="site-header" x-show="!hasLoadError">
        <h1 class="site-title">Icon Library</h1>

        <form class="search-form" role="search" @submit.prevent>
          <label for="icon-search">Rechercher une icone</label>
          <div class="search-field-wrapper">
            <input
              id="icon-search"
              name="icon-search"
              type="search"
              placeholder="Nom, mot-cle..."
              autocomplete="off"
              x-model="searchInput"
            />
            <button
              type="button"
              aria-label="Effacer la recherche"
              @click="clearSearch()"
              x-show="searchInput.length > 0"
            >
              x
            </button>
          </div>
        </form>
      </header>

      <main class="content" id="main-content" x-show="!hasLoadError">
        <section class="loading-state" x-show="isLoading" aria-live="polite">
          <p>Chargement des icones...</p>
        </section>

        <section class="categories-view" aria-label="Categories d'icones" x-show="!hasActiveSearch && !isLoading">
          <template x-for="category in displayedCategories()" :key="category.id">
            <section class="category-section" :aria-label="category.label">
              <h2 class="category-title" x-text="category.label"></h2>

              <div class="icon-grid" x-show="category.limitedIcons.length > 0">
                <template x-for="icon in category.limitedIcons" :key="icon.id">
                  <article class="icon-card-wrapper">
                    <button
                      type="button"
                      class="icon-card"
                      :aria-label="`Voir les details de ${icon.name}`"
                      @click="openDetail(icon)"
                    >
                      <img
                        class="icon-image"
                        :src="icon.file"
                        :alt="icon.name"
                        loading="lazy"
                        @error="markIconAsBroken(icon.id)"
                      />
                      <span class="icon-name" x-text="icon.name"></span>
                    </button>
                  </article>
                </template>
              </div>

              <p class="category-empty" x-show="category.limitedIcons.length === 0">Aucune icone disponible</p>
            </section>
          </template>
        </section>

        <section class="search-results-view" aria-live="polite" x-show="hasActiveSearch && !isLoading">
          <div class="icon-grid" x-show="searchResults().length > 0">
            <template x-for="icon in searchResults()" :key="icon.id">
              <article class="icon-card-wrapper">
                <button
                  type="button"
                  class="icon-card"
                  :aria-label="`Voir les details de ${icon.name}`"
                  @click="openDetail(icon)"
                >
                  <img
                    class="icon-image"
                    :src="icon.file"
                    :alt="icon.name"
                    loading="lazy"
                    @error="markIconAsBroken(icon.id)"
                  />
                  <span class="icon-name" x-text="icon.name"></span>
                  <span class="icon-category" x-text="icon.categoryLabel"></span>
                </button>
              </article>
            </template>
          </div>

          <p class="search-empty" x-show="searchResults().length === 0">
            Aucune icone trouvee pour "<span x-text="debouncedSearchQuery"></span>"
          </p>
        </section>
      </main>

      <aside
        class="icon-detail-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="icon-detail-title"
        hidden
      >
        <!-- Le detail de l'icone sera rendu ici -->
      </aside>
    </div>
  </body>
</html>
